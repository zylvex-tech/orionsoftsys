# ============================================================
# GitHub Actions — Deploy to cPanel (orionsoftsystems.com.ng)
# Triggers on every push to the `main` branch.
# Uses SSH + rsync to push files to cPanel, then performs a
# zero-downtime rolling reload of the Node.js app via PM2.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   HOST         – server hostname / IP
#   SSH_PORT     – SSH port (default 22; cPanel often uses 2222)
#   USERNAME     – cPanel account username
#   SSH_KEY      – contents of ~/.ssh/id_rsa (private key, PEM format)
#   DEPLOY_PATH  – absolute path on server, e.g. /home/username/orionsoftsystems.com.ng
#   ENV_FILE     – full contents of your production .env file (multi-line secret)
# ============================================================

name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:   # allows manual trigger from GitHub UI

concurrency:
  group: production-deploy
  cancel-in-progress: false   # never cancel an in-flight deploy

env:
  NODE_VERSION: "18"
  PRODUCTION_URL: "https://orionsoftsystems.com.ng"
  HEALTH_CHECK_RETRIES: "5"
  HEALTH_CHECK_TIMEOUT: "10"

jobs:
  # ── 1. Validate ─────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── 2. Deploy ───────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # Install only production deps locally so they are synced to server
      - name: Install production dependencies
        run: npm ci --omit=dev

      # Write the production .env file (stored as a GitHub Secret)
      # This file is NEVER committed to git — only injected at deploy time.
      - name: Write .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      # Sync all project files to the cPanel server over SSH/rsync.
      # Excluded: .git, .github, dev-only files, and the .env source template.
      - name: Sync files to cPanel via rsync over SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avzr
            --delete
            --exclude='.git'
            --exclude='.github'
            --exclude='*.log'
            --exclude='server/.env.example'
            --exclude='.qwen'
            --exclude='render.yaml'
          path: ./
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.USERNAME }}
          remote_key: ${{ secrets.SSH_KEY }}

      # SSH into the server, install dependencies, and perform a
      # zero-downtime rolling reload via PM2 cluster mode.
      - name: Install server deps and reload app with PM2 (zero-downtime)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail

            echo "📂 Entering deploy directory..."
            cd "${{ secrets.DEPLOY_PATH }}"

            echo "📦 Installing production Node.js dependencies..."
            npm ci --omit=dev --prefer-offline

            echo "🔄 Performing zero-downtime reload with PM2..."
            if pm2 list | grep -q "orion-saas"; then
              # reload sends SIGINT to old workers one at a time, waits for
              # new workers to be ready, then kills old ones — zero downtime
              pm2 reload orion-saas --update-env
            else
              echo "⚠️  App not found in PM2 — starting fresh..."
              pm2 start ecosystem.config.js --env production
            fi

            pm2 save

            echo ""
            echo "✅ Deployment complete!"
            echo "🌐 Live at: ${{ env.PRODUCTION_URL }}"
            echo "🔌 Health:  ${{ env.PRODUCTION_URL }}/api/health"

      # Verify the app is responding after deploy.
      # Retries up to HEALTH_CHECK_RETRIES times with HEALTH_CHECK_TIMEOUT-second back-off.
      - name: Health check
        run: |
          echo "⏳ Waiting for app to become healthy..."
          for i in $(seq 1 ${{ env.HEALTH_CHECK_RETRIES }}); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time ${{ env.HEALTH_CHECK_TIMEOUT }} \
              ${{ env.PRODUCTION_URL }}/api/health || echo "000")
            echo "  Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed!"
              exit 0
            fi
            sleep ${{ env.HEALTH_CHECK_TIMEOUT }}
          done
          echo "❌ Health check failed after ${{ env.HEALTH_CHECK_RETRIES }} attempts"
          exit 1
