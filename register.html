<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your Orion Soft Systems account and start a 14-day free trial.">
  <title>Create Account | Orion Soft Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 1.5rem 3rem;
    }
    .auth-card {
      width: 100%;
      max-width: 480px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
    }
    .auth-card h1 { font-size: 1.75rem; text-align: center; margin-bottom: 0.5rem; }
    .auth-card .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 2rem; }
    .trial-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background: rgba(245, 166, 35, 0.15);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      color: var(--accent-blue);
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .trial-badge-wrap { text-align: center; }
    .auth-error {
      background: rgba(229, 57, 53, 0.1);
      border: 1px solid rgba(229, 57, 53, 0.3);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      color: #e53935;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    .auth-error.visible { display: block; }
    .auth-footer {
      text-align: center;
      margin-top: 2rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .auth-footer a { color: var(--accent-blue); font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
    .back-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;
    }
    .back-link:hover { color: var(--accent-blue); }
    .password-field { position: relative; }
    .password-toggle {
      position: absolute; right: 0.75rem; top: 50%; transform: translateY(-30%);
      background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.85rem;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="page-loader"><div class="loader-spinner"></div></div>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="back-link">&larr; Back to Home</a>
      <div class="lang-switcher" style="position:static;">
        <button class="lang-switcher-btn" id="langSwitcherBtn" aria-label="Switch language">EN</button>
        <div class="lang-dropdown" id="langDropdown">
          <button class="lang-option" data-lang="en" data-i18n-text="lang.english">English</button>
          <button class="lang-option" data-lang="fr" data-i18n-text="lang.french">Français</button>
          <button class="lang-option" data-lang="es" data-i18n-text="lang.spanish">Español</button>
          <button class="lang-option" data-lang="ha" data-i18n-text="lang.hausa">Hausa</button>
          <button class="lang-option" data-lang="yo" data-i18n-text="lang.yoruba">Yorùbá</button>
          <button class="lang-option" data-lang="de" data-i18n-text="lang.german">Deutsch</button>
          <button class="lang-option" data-lang="ig" data-i18n-text="lang.igbo">Igbo</button>
          <button class="lang-option" data-lang="ar" data-i18n-text="lang.arabic">العربية</button>
        </div>
      </div>
      <div class="trial-badge-wrap">
        <span class="trial-badge" data-i18n-text="register.trial">14-Day Free Trial</span>
      </div>
      <h1 data-i18n-text="register.title">Create Your Account</h1>
      <p class="subtitle" data-i18n-text="register.subtitle">Start building AI-powered systems today</p>

      <div class="auth-error" id="authError"></div>

      <form id="registerForm" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="regName" data-i18n-text="register.name">Full Name</label>
            <input type="text" id="regName" name="name" class="form-control" placeholder="John Doe" data-i18n-placeholder="register.name" required>
          </div>
          <div class="form-group">
            <label for="regPhone" data-i18n-text="register.phone">Phone (optional)</label>
            <input type="tel" id="regPhone" name="phone" class="form-control" placeholder="+234..." data-i18n-placeholder="register.phone">
          </div>
        </div>
        <div class="form-group">
          <label for="regEmail" data-i18n-text="register.email">Email Address</label>
          <input type="email" id="regEmail" name="email" class="form-control" placeholder="you@company.com" data-i18n-placeholder="register.email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="regBusiness" data-i18n-text="register.business">Business Type</label>
          <select id="regBusiness" name="businessType" class="form-control">
            <option value="small-business">Small Business</option>
            <option value="education">Education</option>
            <option value="healthcare">Healthcare</option>
            <option value="real-estate">Real Estate</option>
            <option value="ecommerce">E-commerce</option>
            <option value="startup">Startup</option>
            <option value="enterprise">Enterprise</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="regPassword" data-i18n-text="register.password">Password</label>
          <div class="password-field">
            <input type="password" id="regPassword" name="password" class="form-control" placeholder="Min. 6 characters" data-i18n-placeholder="register.password" required minlength="6" autocomplete="new-password">
            <button type="button" class="password-toggle" onclick="togglePassword('regPassword', this)">Show</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="regBtn" data-i18n-text="register.button">Create Account</button>
      </form>

      <div class="auth-footer">
        <span data-i18n-text="register.has_account">Already have an account?</span> <a href="login.html" data-i18n-text="login.back_home">Sign in</a>
      </div>
    </div>
  </div>

  <!-- Sticky CTA -->
  <div class="sticky-cta">
    <a href="login.html" class="btn btn-primary">Get Started Free</a>
  </div>

  <script>
    const API_URL = localStorage.getItem("apiUrl") || "/api";

    function togglePassword(fieldId, btn) {
      const field = document.getElementById(fieldId);
      if (field.type === "password") { field.type = "text"; btn.textContent = "Hide"; }
      else { field.type = "password"; btn.textContent = "Show"; }
    }

    function showError(msg) {
      const el = document.getElementById("authError");
      el.textContent = msg;
      el.classList.add("visible");
    }

    document.getElementById("registerForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      
      const name = document.getElementById("regName").value.trim();
      const email = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value;
      const businessType = document.getElementById("regBusiness").value;
      const phone = document.getElementById("regPhone").value.trim();
      const btn = document.getElementById("regBtn");

      if (!name || !email || !password) {
        showError("Please fill in all required fields");
        return;
      }
      if (password.length < 6) {
        showError("Password must be at least 6 characters");
        return;
      }

      btn.textContent = "Creating account...";
      btn.disabled = true;

      try {
        const res = await fetch(`${API_URL}/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password, businessType, phone })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || "Registration failed");
          return;
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "dashboard.html";

      } catch (err) {
        showError("Connection error. Is the backend running?");
      } finally {
        btn.textContent = "Create Account";
        btn.disabled = false;
      }
    });

    if (localStorage.getItem("token")) {
      window.location.href = "dashboard.html";
    }
  </script>
  <script src="assets/js/translations.js"></script>
</body>
</html>
